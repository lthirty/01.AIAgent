<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Console</title>
  <style>
    :root {
      --bg: #0a1524;
      --panel: #11243a;
      --line: #2a4f70;
      --text: #ecf6ff;
      --muted: #9cb7d3;
      --btn: #1d79e7;
      --btn-alt: #0e9f8f;
      --btn-test: #1a8e56;
      --btn-warn: #f4b000;
      --progress: #0bd9a5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 800px at -10% -20%, #27466b 0%, transparent 60%),
        radial-gradient(1000px 700px at 120% -10%, #153758 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1300px;
      margin: 20px auto;
      padding: 0 14px 24px;
      display: grid;
      grid-template-columns: 1.25fr .95fr;
      gap: 14px;
    }
    .panel {
      background: linear-gradient(180deg, #14304b 0%, #0f2238 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.25);
    }
    h1, h2 {
      margin: 0 0 8px;
      line-height: 1.2;
    }
    h1 { font-size: 22px; }
    h2 { font-size: 16px; }
    p { margin: 0 0 10px; color: var(--muted); font-size: 13px; }
    textarea, input, select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #0b1a2c;
      color: var(--text);
      padding: 10px;
      font-size: 14px;
    }
    textarea { min-height: 180px; resize: vertical; }
    button {
      border: 0;
      border-radius: 10px;
      color: #fff;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      background: var(--btn);
      white-space: nowrap;
    }
    button.alt { background: var(--btn-alt); }
    button.test { background: var(--btn-test); }
    button.warn { background: var(--btn-warn); color: #1f2937; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .auth-locked {
      background: #5f6770 !important;
      border-color: #7f8790 !important;
      color: #d6dde5 !important;
    }
    .login-user {
      margin-left: auto;
      display: none;
      align-items: center;
      font-size: 12px;
      color: #cde7ff;
      background: #163451;
      border: 1px solid #2a4f70;
      border-radius: 999px;
      padding: 4px 10px;
    }
    .auth-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 8px;
      margin-bottom: 10px;
    }
    .project-row {
      display: grid;
      grid-template-columns: 1.3fr .9fr auto auto;
      gap: 8px;
      margin-bottom: 10px;
    }
    .project-history {
      margin: 8px 0 10px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0b1b2d;
      max-height: 130px;
      overflow: auto;
      font-size: 12px;
    }
    .project-history .meta { margin: 2px 0 0; }
    .btn-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }
    .btn-blue { background: #1d79e7; }
    .btn-brown { background: #8a5a2b; }
    .btn-orange { background: #e15b2c; }
    .btn-green { background: #1a8e56; }
    .start-row-2 { grid-column: 1; }
    .start-row-3 { grid-column: 1; }
    .start-row-4 { grid-column: 1; }
    .status {
      margin-top: 10px;
      min-height: 22px;
      color: #93f5f3;
      font-size: 13px;
      white-space: pre-wrap;
    }
    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #0b1b2d;
    }
    .list {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 240px;
      overflow: auto;
    }
    .list li {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
      background: #0f2135;
      font-size: 12px;
    }
    #results a,
    #results a:visited {
      color: #ffffff;
    }
    a.md-file,
    a.md-file:visited {
      color: #ffffff;
    }
    .meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .inline {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .small {
      font-size: 12px;
      color: var(--muted);
    }
    .role-item { margin-bottom: 8px; }
    .role-item label {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      color: #9bd7ff;
      font-weight: 700;
    }
    .role-item textarea { min-height: 88px; font-size: 12px; }
    .anim-zone {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(180deg, #10243b 0%, #0a1727 100%);
      padding: 10px;
      min-height: 170px;
      position: relative;
      overflow: hidden;
    }
    .scene { height: 100px; display: flex; align-items: flex-end; justify-content: center; gap: 14px; }
    .avatar {
      --head: #ffd9b1;
      --head-border: #f3c99a;
      --ear: #ffd9b1;
      --snout: #ffe8cf;
      --outfit: #5ea3d6;
      --outfit-border: #87b9de;
      width: 54px;
      height: 72px;
      position: relative;
      opacity: .3;
      transform: translateY(8px);
      transition: all .3s ease;
    }
    .avatar::before {
      content: "";
      position: absolute;
      top: 0;
      left: 12px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 8px 4px, var(--ear) 0 5px, transparent 5.5px),
        radial-gradient(circle at 22px 4px, var(--ear) 0 5px, transparent 5.5px),
        radial-gradient(circle at 11px 13px, #1b1f24 0 1.6px, transparent 2px),
        radial-gradient(circle at 19px 13px, #1b1f24 0 1.6px, transparent 2px),
        radial-gradient(ellipse at 15px 20px, var(--snout) 0 6px, transparent 6.4px),
        var(--head);
      border: 2px solid var(--head-border);
    }
    .avatar::after {
      content: "";
      position: absolute;
      top: 30px;
      left: 8px;
      width: 38px;
      height: 40px;
      border-radius: 12px 12px 6px 6px;
      background: var(--outfit);
      border: 2px solid var(--outfit-border);
    }
    .avatar .name {
      position: absolute;
      bottom: -18px;
      width: 100%;
      text-align: center;
      font-size: 10px;
      color: #92b7d7;
    }
    .scene.cto .avatar.cto,
    .scene.collab .avatar {
      opacity: 1;
      transform: translateY(0);
      animation: bob 1.2s ease-in-out infinite;
    }
    .avatar.role-cto {
      --head: #9b6a3d;
      --head-border: #7a4f2c;
      --ear: #9b6a3d;
      --snout: #d7b38f;
      --outfit: #6d452b;
      --outfit-border: #98603a;
    }
    .avatar.role-pm {
      --head: #f5f7fb;
      --head-border: #cfd7e3;
      --ear: #f5f7fb;
      --snout: #ffffff;
      --outfit: #dde6f2;
      --outfit-border: #b8c6d8;
    }
    .avatar.role-sch { --outfit: #2fa486; --outfit-border: #6dceb6; }
    .avatar.role-pcb { --outfit: #3a9e4f; --outfit-border: #7fcf90; --head: #f5cc9f; }
    .avatar.role-test { --outfit: #6a7aa1; --outfit-border: #9eb0dc; }
    .avatar.role-dfm { --outfit: #b87a36; --outfit-border: #e0a55f; }
    .avatar.role-risk { --outfit: #c85858; --outfit-border: #e48a8a; }
    .avatar.role-review { --outfit: #7b63c3; --outfit-border: #ad97e5; }
    .scene.cto .desk {
      display: block;
    }
    .desk {
      display: none;
      position: absolute;
      bottom: 28px;
      width: 120px;
      height: 10px;
      background: #294d6f;
      border-radius: 6px;
      left: 50%;
      transform: translateX(-50%);
    }
    .laptop {
      display: none;
      position: absolute;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      width: 52px;
      height: 28px;
      border: 2px solid #7fc7ff;
      border-bottom: 10px solid #5b94c4;
      border-radius: 4px;
      background: #12273f;
    }
    .scene.cto .laptop { display: block; animation: flicker 1s linear infinite; }
    .bubble {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #1d3a58;
      border: 1px solid #4d7ea7;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 12px;
      color: #c5ebff;
      opacity: 0;
    }
    .scene.collab ~ .bubble { opacity: 1; animation: talk 1.6s ease-in-out infinite; }
    .progress-wrap {
      margin-top: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      height: 18px;
      background: #08111e;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0694c8 0%, var(--progress) 100%);
      transition: width .2s ease;
    }
    .progress-text {
      margin-top: 6px;
      font-size: 12px;
      color: #9ddac9;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes flicker {
      0%, 100% { box-shadow: 0 0 0 transparent; }
      50% { box-shadow: 0 0 10px rgba(100, 194, 255, .55); }
    }
    @keyframes talk {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-5px); }
    }
    @media (max-width: 980px) {
      .wrap { grid-template-columns: 1fr; }
      .auth-row { grid-template-columns: 1fr; }
      .project-row { grid-template-columns: 1fr; }
      .btn-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>多角色 Agent 控制台</h1>
      <p>支持登录、上传资料、单角色分析与多角色协同讨论。</p>

      <div class="auth-row">
        <input id="username" placeholder="用户名" value="admin" />
        <input id="password" type="password" placeholder="密码（默认 admin）" />
        <button id="loginBtn">登录</button>
        <button id="logoutBtn" class="warn">退出</button>
      </div>

      <div class="project-row">
        <select id="projectSelect"></select>
        <input id="projectName" placeholder="新项目名称（可选）" />
        <button id="loadProjectBtn" class="alt">加载项目</button>
        <button id="saveProjectBtn" class="alt">保存/新建</button>
      </div>
      <div id="projectHistory" class="project-history">暂无项目历史</div>

      <textarea id="pd" placeholder="输入产品定义（目标、约束、里程碑、预算、质量要求等）"></textarea>

      <div class="split">
        <div class="card">
          <h2>上传资料</h2>
          <div class="inline">
            <input id="uploadInput" type="file" />
            <button id="uploadBtn" class="alt">上传</button>
          </div>
          <div class="small">勾选后会自动作为上下文给 Agent 分析。</div>
          <ul id="materials" class="list"></ul>
        </div>
        <div class="card">
          <h2>结果文件</h2>
          <ul id="results" class="list"></ul>
        </div>
      </div>

      <div class="btn-grid">
        <button data-role="CTO" class="btn-blue">运行 CTO</button>
        <button data-role="PM" class="btn-blue">运行 PM</button>
        <button data-role="SCH design" class="btn-brown start-row-2">运行 SCH design</button>
        <button data-role="PCB design" class="btn-brown">运行 PCB design</button>
        <button data-role="test" class="btn-brown">运行 test</button>
        <button data-role="DFM" class="btn-orange start-row-3">运行 DFM</button>
        <button data-role="Risk" class="btn-orange">运行 Risk</button>
        <button data-role="Review" class="btn-orange">运行 Review</button>
        <button id="runAll" class="btn-green start-row-4">多角色协助讨论</button>
        <button id="testLlm" class="btn-green">测试模型连通性</button>
      </div>

      <div class="anim-zone">
        <h2>工作动画</h2>
        <div class="scene" id="scene">
          <div class="avatar cto role-cto"><div class="name">布布</div></div>
          <div class="avatar role-pm"><div class="name">一二</div></div>
          <div class="avatar role-sch"><div class="name">SCH</div></div>
          <div class="avatar role-pcb"><div class="name">PCB</div></div>
          <div class="avatar role-test"><div class="name">Test</div></div>
          <div class="avatar role-dfm"><div class="name">DFM</div></div>
          <div class="avatar role-risk"><div class="name">Risk</div></div>
          <div class="avatar role-review"><div class="name">Review</div></div>
          <div class="desk"></div>
          <div class="laptop"></div>
        </div>
        <div class="bubble" id="bubble">正在讨论关键方案...</div>
        <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-text" id="progressText">等待任务开始</div>
      </div>

      <div class="status" id="status"></div>
    </section>

    <aside class="panel">
      <h1>Agent 定义</h1>
      <p>可查看并修改每个角色的定义，保存后立即生效。</p>
      <div id="roleDefs"></div>
      <button id="saveRoles" class="alt">保存角色定义</button>
    </aside>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const pdEl = document.getElementById('pd');
    const resultEl = document.getElementById('results');
    const materialsEl = document.getElementById('materials');
    const roleDefsEl = document.getElementById('roleDefs');
    const roleButtons = Array.from(document.querySelectorAll('button[data-role]'));
    const runAllBtn = document.getElementById('runAll');
    const testLlmBtn = document.getElementById('testLlm');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const uploadInputEl = document.getElementById('uploadInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const saveRolesBtn = document.getElementById('saveRoles');
    const projectSelectEl = document.getElementById('projectSelect');
    const projectNameEl = document.getElementById('projectName');
    const loadProjectBtn = document.getElementById('loadProjectBtn');
    const saveProjectBtn = document.getElementById('saveProjectBtn');
    const projectHistoryEl = document.getElementById('projectHistory');
    const sceneEl = document.getElementById('scene');
    const bubbleEl = document.getElementById('bubble');
    const progressBarEl = document.getElementById('progressBar');
    const progressTextEl = document.getElementById('progressText');
    const titleEl = document.querySelector('.panel h1');
    const loginUserEl = document.createElement('span');

    const TOKEN_KEY = 'agent_console_token';
    const USERNAME_KEY = 'agent_console_username';
    const PROJECT_KEY = 'agent_console_project_id';
    let progressTimer = null;
    let progressStartAt = 0;
    let progressExpectedMs = 120000;
    let promptsCache = {};
    let authLocked = false;
    let currentProjectId = '';

    titleEl.style.display = 'flex';
    titleEl.style.alignItems = 'center';
    titleEl.style.gap = '10px';
    loginUserEl.className = 'login-user';
    titleEl.appendChild(loginUserEl);

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
    function setToken(token) { token ? localStorage.setItem(TOKEN_KEY, token) : localStorage.removeItem(TOKEN_KEY); }
    function getSavedUsername() { return localStorage.getItem(USERNAME_KEY) || ''; }
    function setSavedUsername(username) { username ? localStorage.setItem(USERNAME_KEY, username) : localStorage.removeItem(USERNAME_KEY); }
    function getSavedProjectId() { return localStorage.getItem(PROJECT_KEY) || ''; }
    function setSavedProjectId(projectId) { projectId ? localStorage.setItem(PROJECT_KEY, projectId) : localStorage.removeItem(PROJECT_KEY); }
    function authHeaders() { const t = getToken(); return t ? { 'X-Access-Token': t } : {}; }

    function projectDisplayName(project) {
      const n = (project && project.name) ? project.name : 'Untitled Project';
      const t = (project && project.updatedAt) ? project.updatedAt.replace('T', ' ') : '';
      return t ? `${n} (${t})` : n;
    }

    function renderProjectHistory(project) {
      const history = (project && project.history) || [];
      projectHistoryEl.innerHTML = '';
      if (!history.length) {
        projectHistoryEl.textContent = '暂无项目历史';
        return;
      }
      const ul = document.createElement('ul');
      ul.className = 'list';
      history.forEach(item => {
        const li = document.createElement('li');
        const token = getToken();
        const url = token ? `${item.url}?t=${encodeURIComponent(token)}` : item.url;
        const type = item.type === 'collaboration' ? '协作' : '单角色';
        const mdClass = item.file && item.file.toLowerCase().endsWith('.md') ? ' class="md-file"' : '';
        li.innerHTML = `<a href="${url}" target="_blank"${mdClass}>${item.file}</a><div class="meta">${item.time} | ${type}</div>`;
        ul.appendChild(li);
      });
      projectHistoryEl.appendChild(ul);
    }

    async function refreshProjects(selectedId = '') {
      const r = await authedFetch('/api/projects');
      const data = await r.json();
      const projects = data.projects || [];
      projectSelectEl.innerHTML = '';
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = '选择历史项目...';
      projectSelectEl.appendChild(placeholder);
      projects.forEach(p => {
        const op = document.createElement('option');
        op.value = p.id;
        op.textContent = projectDisplayName(p);
        projectSelectEl.appendChild(op);
      });

      const preferredId = selectedId || currentProjectId || getSavedProjectId();
      if (preferredId && projects.some(p => p.id === preferredId)) {
        projectSelectEl.value = preferredId;
      } else {
        projectSelectEl.value = '';
      }
    }

    async function loadProject(projectId = '') {
      const id = (projectId || projectSelectEl.value || '').trim();
      if (!id) {
        statusEl.textContent = '请先选择一个历史项目';
        return;
      }
      const r = await authedFetch(`/api/projects/${encodeURIComponent(id)}`);
      const data = await r.json();
      if (!data.ok || !data.project) throw new Error(data.error || '项目加载失败');
      const p = data.project;
      currentProjectId = p.id;
      setSavedProjectId(currentProjectId);
      projectSelectEl.value = p.id;
      projectNameEl.value = p.name || '';
      pdEl.value = p.productDefinition || '';
      renderProjectHistory(p);
      statusEl.textContent = `已加载项目: ${p.name || p.id}`;
    }

    async function saveProject() {
      const name = projectNameEl.value.trim();
      if (!name && !currentProjectId) {
        statusEl.textContent = '新建项目请先输入项目名称';
        return '';
      }
      const r = await authedFetch('/api/projects/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          id: currentProjectId || '',
          name,
          productDefinition: pdEl.value.trim()
        })
      });
      const data = await r.json();
      if (!data.ok || !data.project) throw new Error(data.error || '项目保存失败');
      currentProjectId = data.project.id;
      setSavedProjectId(currentProjectId);
      projectNameEl.value = data.project.name || projectNameEl.value;
      await refreshProjects(currentProjectId);
      projectSelectEl.value = currentProjectId;
      renderProjectHistory(data.project);
      statusEl.textContent = `项目已保存: ${data.project.name}`;
      return currentProjectId;
    }

    async function ensureProjectId() {
      if (currentProjectId) {
        await saveProject();
        return currentProjectId;
      }
      if (!projectNameEl.value.trim()) {
        const stamp = new Date().toISOString().replace('T', ' ').slice(0, 16);
        projectNameEl.value = `项目_${stamp}`;
      }
      return await saveProject();
    }

    function setAuthLock(locked, username='') {
      authLocked = !!locked;
      usernameEl.disabled = authLocked;
      passwordEl.disabled = authLocked;
      loginBtn.disabled = authLocked;
      [usernameEl, passwordEl, loginBtn].forEach(el => el.classList.toggle('auth-locked', authLocked));
      if (authLocked && username) {
        loginUserEl.textContent = `当前用户：${username}`;
        loginUserEl.style.display = 'inline-flex';
      } else {
        loginUserEl.textContent = '';
        loginUserEl.style.display = 'none';
      }
    }

    function setBusy(busy, text='') {
      [...roleButtons, runAllBtn, testLlmBtn, logoutBtn, uploadBtn, saveRolesBtn, loadProjectBtn, saveProjectBtn].forEach(b => b.disabled = busy);
      projectSelectEl.disabled = busy;
      loginBtn.disabled = busy || authLocked;
      statusEl.textContent = text;
    }

    function getSelectedMaterialIds() {
      return Array.from(document.querySelectorAll('input[name="materialPick"]:checked')).map(el => el.value);
    }

    function setAnimation(mode) {
      sceneEl.className = `scene ${mode || ''}`;
      if (mode === 'cto') {
        bubbleEl.textContent = 'CTO 正在专注分析中...';
      } else if (mode === 'collab') {
        bubbleEl.textContent = '多角色正在讨论中...';
      } else {
        bubbleEl.textContent = '等待任务开始';
      }
    }

    function startProgress(expectedMs = 120000) {
      stopProgress();
      progressStartAt = Date.now();
      progressExpectedMs = expectedMs;
      progressBarEl.style.width = '0%';
      progressTextEl.textContent = '预计完成时间：约 2 分钟内';
      progressTimer = setInterval(() => {
        const elapsed = Date.now() - progressStartAt;
        const p = Math.min(97, Math.round((elapsed / progressExpectedMs) * 100));
        progressBarEl.style.width = `${p}%`;
        progressTextEl.textContent = `处理中... ${p}%`;
      }, 300);
    }

    function stopProgress(done = false) {
      if (progressTimer) clearInterval(progressTimer);
      progressTimer = null;
      if (done) {
        progressBarEl.style.width = '100%';
        progressTextEl.textContent = '任务完成';
      }
    }

    async function authedFetch(url, options = {}) {
      const headers = Object.assign({}, options.headers || {}, authHeaders());
      const resp = await fetch(url, Object.assign({}, options, { headers }));
      if (resp.status === 401) {
        setToken('');
        setSavedUsername('');
        setSavedProjectId('');
        currentProjectId = '';
        setAuthLock(false);
        throw new Error('未登录或会话过期，请重新登录');
      }
      return resp;
    }

    async function refreshResults() {
      const r = await authedFetch('/api/results');
      const data = await r.json();
      resultEl.innerHTML = '';
      for (const item of data.results || []) {
        const li = document.createElement('li');
        const token = getToken();
        const link = token ? `${item.url}?t=${encodeURIComponent(token)}` : item.url;
        const mdClass = item.name && item.name.toLowerCase().endsWith('.md') ? ' class="md-file"' : '';
        li.innerHTML = `<a href="${link}" target="_blank"${mdClass}>${item.name}</a><div class="meta">${item.mtime} | ${(item.size / 1024).toFixed(1)} KB</div>`;
        resultEl.appendChild(li);
      }
    }

    async function refreshMaterials() {
      const r = await authedFetch('/api/materials');
      const data = await r.json();
      materialsEl.innerHTML = '';
      for (const item of data.materials || []) {
        const li = document.createElement('li');
        li.innerHTML = `<label><input type="checkbox" name="materialPick" value="${item.id}" checked /> ${item.name}</label><div class="meta">${item.mtime} | ${(item.size / 1024).toFixed(1)} KB</div>`;
        materialsEl.appendChild(li);
      }
      if ((data.materials || []).length === 0) {
        materialsEl.innerHTML = '<li>暂无资料</li>';
      }
    }

    function renderRoleDefs(prompts) {
      promptsCache = Object.assign({}, prompts || {});
      roleDefsEl.innerHTML = '';
      for (const [role, prompt] of Object.entries(promptsCache)) {
        const wrap = document.createElement('div');
        wrap.className = 'role-item';
        wrap.innerHTML = `<label>${role}</label><textarea data-role-def="${role}">${prompt || ''}</textarea>`;
        roleDefsEl.appendChild(wrap);
      }
    }

    async function loadRoleDefs() {
      const r = await authedFetch('/api/roles');
      const data = await r.json();
      renderRoleDefs(data.prompts || {});
    }

    async function saveRoleDefs() {
      const prompts = {};
      document.querySelectorAll('textarea[data-role-def]').forEach(el => {
        prompts[el.dataset.roleDef] = el.value.trim();
      });
      setBusy(true, '正在保存角色定义...');
      try {
        const r = await authedFetch('/api/roles/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompts })
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || '保存失败');
        renderRoleDefs(data.prompts || prompts);
        statusEl.textContent = '角色定义已保存';
      } catch (e) {
        statusEl.textContent = `保存失败: ${e.message}`;
      } finally {
        setBusy(false, statusEl.textContent);
      }
    }

    async function uploadMaterial() {
      const file = uploadInputEl.files && uploadInputEl.files[0];
      if (!file) {
        statusEl.textContent = '请先选择要上传的资料文件';
        return;
      }
      setBusy(true, '正在上传资料...');
      try {
        const fd = new FormData();
        fd.append('file', file);
        const r = await authedFetch('/api/upload-material', { method: 'POST', body: fd });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || '上传失败');
        uploadInputEl.value = '';
        statusEl.textContent = `上传成功: ${data.file}`;
        await refreshMaterials();
      } catch (e) {
        statusEl.textContent = `上传失败: ${e.message}`;
      } finally {
        setBusy(false, statusEl.textContent);
      }
    }

    async function login() {
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      if (!username || !password) {
        statusEl.textContent = '请输入用户名和密码';
        return;
      }
      setBusy(true, '正在登录...');
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || '登录失败');
        setToken(data.token || '');
        setSavedUsername(username);
        setAuthLock(true, username);
        passwordEl.value = '';
        statusEl.textContent = '登录成功';
        await Promise.all([refreshResults(), refreshMaterials(), loadRoleDefs(), refreshProjects()]);
        const savedProjectId = getSavedProjectId();
        if (savedProjectId) {
          try { await loadProject(savedProjectId); } catch (_) {}
        } else {
          renderProjectHistory({ history: [] });
        }
      } catch (e) {
        statusEl.textContent = `登录失败: ${e.message}`;
      } finally {
        setBusy(false, statusEl.textContent);
      }
    }

    function logout() {
      setToken('');
      setSavedUsername('');
      setAuthLock(false);
      resultEl.innerHTML = '';
      materialsEl.innerHTML = '';
      roleDefsEl.innerHTML = '';
      projectSelectEl.innerHTML = '';
      projectNameEl.value = '';
      projectHistoryEl.textContent = '暂无项目历史';
      currentProjectId = '';
      setSavedProjectId('');
      setAnimation('');
      stopProgress();
      statusEl.textContent = '已退出';
    }

    async function runRole(role) {
      const productDefinition = pdEl.value.trim();
      if (!productDefinition) {
        statusEl.textContent = '请先输入产品定义';
        return;
      }
      setAnimation(role === 'CTO' ? 'cto' : '');
      startProgress(120000);
      setBusy(true, `正在运行 ${role}...`);
      try {
        const projectId = await ensureProjectId();
        const r = await authedFetch('/api/run-agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ role, productDefinition, materialIds: getSelectedMaterialIds(), projectId })
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || '执行失败');
        const token = getToken();
        const link = `${data.url}?t=${encodeURIComponent(token)}`;
        statusEl.innerHTML = `${role} 已完成: <a href="${link}" target="_blank">${data.file}</a>`;
        await Promise.all([refreshResults(), refreshProjects(projectId)]);
        await loadProject(projectId);
        stopProgress(true);
      } catch (e) {
        stopProgress(false);
        progressTextEl.textContent = '任务失败';
        statusEl.textContent = `错误: ${e.message}`;
      } finally {
        setBusy(false, statusEl.textContent);
      }
    }

    async function runCollaboration() {
      const productDefinition = pdEl.value.trim();
      if (!productDefinition) {
        statusEl.textContent = '请先输入产品定义';
        return;
      }
      setAnimation('collab');
      startProgress(120000);
      setBusy(true, '正在进行多角色协助讨论（预计 2 分钟内）...');
      try {
        const projectId = await ensureProjectId();
        const r = await authedFetch('/api/run-collaboration', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ productDefinition, materialIds: getSelectedMaterialIds(), projectId })
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || '执行失败');
        const token = getToken();
        const link = `${data.url}?t=${encodeURIComponent(token)}`;
        statusEl.innerHTML = `协作完成: <a href="${link}" target="_blank">${data.file}</a>`;
        await Promise.all([refreshResults(), refreshProjects(projectId)]);
        await loadProject(projectId);
        stopProgress(true);
      } catch (e) {
        stopProgress(false);
        progressTextEl.textContent = '任务失败';
        statusEl.textContent = `错误: ${e.message}`;
      } finally {
        setBusy(false, statusEl.textContent);
      }
    }

    async function testLlm() {
      setBusy(true, '正在测试模型连通性...');
      try {
        const r = await authedFetch('/api/test-llm', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: '{}'
        });
        const data = await r.json();
        if (!data.ok) throw new Error(data.error || '测试失败');
        const x = data.result || {};
        statusEl.textContent = `连通成功: ${x.provider} / ${x.model}\n${x.preview || ''}`;
      } catch (e) {
        statusEl.textContent = `连通失败: ${e.message}`;
      } finally {
        setBusy(false, statusEl.textContent);
      }
    }

    roleButtons.forEach(btn => btn.addEventListener('click', () => runRole(btn.dataset.role)));
    runAllBtn.addEventListener('click', runCollaboration);
    testLlmBtn.addEventListener('click', testLlm);
    loginBtn.addEventListener('click', login);
    logoutBtn.addEventListener('click', logout);
    uploadBtn.addEventListener('click', uploadMaterial);
    saveRolesBtn.addEventListener('click', saveRoleDefs);
    loadProjectBtn.addEventListener('click', () => loadProject().catch(e => {
      statusEl.textContent = `加载项目失败: ${e.message}`;
    }));
    saveProjectBtn.addEventListener('click', () => saveProject().catch(e => {
      statusEl.textContent = `保存项目失败: ${e.message}`;
    }));
    projectSelectEl.addEventListener('change', () => {
      if (!projectSelectEl.value) return;
      loadProject(projectSelectEl.value).catch(e => {
        statusEl.textContent = `加载项目失败: ${e.message}`;
      });
    });

    if (getToken()) {
      const username = getSavedUsername() || usernameEl.value.trim() || 'admin';
      setAuthLock(true, username);
      Promise.all([refreshResults(), refreshMaterials(), loadRoleDefs(), refreshProjects()]).then(async () => {
        const savedProjectId = getSavedProjectId();
        if (savedProjectId) {
          try { await loadProject(savedProjectId); } catch (_) {}
        } else {
          renderProjectHistory({ history: [] });
        }
      }).catch(() => {
        setToken('');
        setSavedUsername('');
        setSavedProjectId('');
        setAuthLock(false);
        statusEl.textContent = '会话失效，请重新登录';
      });
    } else {
      setAuthLock(false);
      renderProjectHistory({ history: [] });
      statusEl.textContent = '请先登录';
    }
  </script>
</body>
</html>
